name: Build release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-linux-glibc:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          phpts: nts

      - uses: dtolnay/rust-toolchain@stable

      - name: Install PHP development headers
        run: sudo apt-get update && sudo apt-get install -y php${{ matrix.php }}-dev

      - name: Build extension
        run: cargo build --release

      - name: Detect architecture
        id: arch
        run: |
          case "$(uname -m)" in
            x86_64)  echo "arch=x86_64" >> "$GITHUB_OUTPUT" ;;
            aarch64) echo "arch=arm64" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Package binary
        run: |
          cp target/release/librabbitmq_ext.so rabbitmq_ext.so
          zip -j "php_rabbitmq_ext-${{ github.event.release.tag_name }}_php${{ matrix.php }}-${{ steps.arch.outputs.arch }}-linux-glibc.zip" rabbitmq_ext.so

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "php_rabbitmq_ext-${{ github.event.release.tag_name }}_php${{ matrix.php }}-${{ steps.arch.outputs.arch }}-linux-glibc.zip"

  build-linux-musl-x86_64:
    runs-on: ubuntu-latest
    container: alpine:3.21
    strategy:
      fail-fast: false
      matrix:
        php: ['82', '83', '84']
        include:
          - php: '82'
            php_dot: '8.2'
          - php: '83'
            php_dot: '8.3'
          - php: '84'
            php_dot: '8.4'
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apk add --no-cache \
            bash curl gcc musl-dev make zip github-cli \
            php${{ matrix.php }}-dev php${{ matrix.php }}-embed

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build extension
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          export PHP=$(which php${{ matrix.php }})
          RUSTFLAGS="-C target-feature=-crt-static" cargo build --release

      - name: Package binary
        run: |
          cp target/release/librabbitmq_ext.so rabbitmq_ext.so
          zip -j "php_rabbitmq_ext-${{ github.event.release.tag_name }}_php${{ matrix.php_dot }}-x86_64-linux-musl.zip" rabbitmq_ext.so

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "php_rabbitmq_ext-${{ github.event.release.tag_name }}_php${{ matrix.php_dot }}-x86_64-linux-musl.zip"

  build-linux-musl-arm64:
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - name: Build in Alpine container
        uses: addnab/docker-run-action@v3
        with:
          image: alpine:3.21
          options: -v ${{ github.workspace }}:/work -w /work
          run: |
            PHP_PKG=$(echo "${{ matrix.php }}" | tr -d '.')

            apk add --no-cache \
              bash curl gcc musl-dev make zip \
              php${PHP_PKG}-dev php${PHP_PKG}-embed

            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            export PATH="$HOME/.cargo/bin:$PATH"
            export PHP=$(which php${PHP_PKG})

            RUSTFLAGS="-C target-feature=-crt-static" cargo build --release

            cp target/release/librabbitmq_ext.so rabbitmq_ext.so
            zip -j "php_rabbitmq_ext-${{ github.event.release.tag_name }}_php${{ matrix.php }}-arm64-linux-musl.zip" rabbitmq_ext.so

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "php_rabbitmq_ext-${{ github.event.release.tag_name }}_php${{ matrix.php }}-arm64-linux-musl.zip"

  build-macos:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          phpts: nts

      - uses: dtolnay/rust-toolchain@stable

      - name: Build extension
        run: cargo build --release

      - name: Package binary
        run: |
          cp target/release/librabbitmq_ext.dylib rabbitmq_ext.so
          zip -j "php_rabbitmq_ext-${{ github.event.release.tag_name }}_php${{ matrix.php }}-arm64-darwin-bsdlibc.zip" rabbitmq_ext.so

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "php_rabbitmq_ext-${{ github.event.release.tag_name }}_php${{ matrix.php }}-arm64-darwin-bsdlibc.zip"
